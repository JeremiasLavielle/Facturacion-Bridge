name: bridge-dev

services:
  db:
    image: postgres:17
    container_name: bridge-postgres
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge_dev
    ports:
      - "5432:5432"
    volumes:
      - bridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge -d bridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: bridge-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  bridge_pgdata: