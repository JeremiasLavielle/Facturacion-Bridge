spring:
  application:
    name: bridge-facturacion
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  servlet:
    context-path: /api
    session:
      timeout: 8h
      cookie:
        http-only: true
        same-site: lax
        secure: false

app:
  operador:
    email: ${OPERADOR_EMAIL:}
    password: ${OPERADOR_PASSWORD:}

emisor:
  nombre-fantasia: "Instituto Bridge"
  razon-social: "Nombre y Apellido del titular"
  domicilio: "Domicilio del instituto - Ciudad, Provincia"
  condicion-fiscal: "Responsable Monotributo"
  ingresos-brutos: "Exento"
  inicio-actividades: "01/01/2020"